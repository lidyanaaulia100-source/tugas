<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesan — Catering Nusantara</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=optional"
        onload="this.onload=null;this.rel='stylesheet'" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown:  #3d1f0a;
      --amber:  #e8a020;
      --cream:  #fdf6ee;
      --white:  #ffffff;
      --muted:  #7a5c3a;
      --border: #e8ddd0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      height: 100dvh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* NAV */
    nav {
      background: var(--brown);
      display: flex; align-items: center; gap: 10px;
      padding: 0 14px; height: 56px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .btn-back {
      background: none; border: none; cursor: pointer;
      color: #d4b896; padding: 8px; border-radius: 8px;
      display: flex; align-items: center;
      transition: background .15s; flex-shrink: 0;
    }
    .btn-back:hover { background: rgba(255,255,255,.1); }
    .nav-info { flex: 1; min-width: 0; }
    .nav-title { font-size: 15px; font-weight: 700; color: #fff; }
    .nav-sub   { font-size: 11px; color: #d4b896; margin-top: 1px; }
    .nav-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg,#c8a87a,#a0784a);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0; overflow: hidden;
      border: 2px solid rgba(255,255,255,.25);
    }
    .nav-avatar img { width:100%; height:100%; object-fit:cover; }
    .nav-meta { font-size: 10px; color: #d4b896; margin-top: 1px; }
    .nav-jam  { font-size: 10px; color: #d4b896; }
    /* nav clickable */
    .nav-profile-btn {
      display:flex;align-items:center;gap:10px;flex:1;min-width:0;
      background:none;border:none;cursor:pointer;text-align:left;padding:6px 4px;
      border-radius:10px;transition:background .15s;
    }
    .nav-profile-btn:hover { background:rgba(255,255,255,.08); }
    /* popup profil admin */
    .admin-popup-overlay {
      position:fixed;inset:0;background:rgba(0,0,0,.5);
      z-index:200;display:flex;align-items:flex-end;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .22s;
    }
    .admin-popup-overlay.show { opacity:1;pointer-events:all; }
    .admin-popup-card {
      background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:480px;
      overflow:hidden;
      transform:translateY(40px);
      transition:transform .28s cubic-bezier(.22,1,.36,1);
      box-shadow:0 -8px 40px rgba(0,0,0,.2);
    }
    .admin-popup-overlay.show .admin-popup-card { transform:translateY(0); }
    .admin-popup-banner {
      background:linear-gradient(135deg,var(--brown),#7a3e10);
      padding:28px 20px 22px;
      display:flex;flex-direction:column;align-items:center;gap:10px;
    }
    .admin-popup-av {
      width:86px;height:86px;border-radius:50%;
      border:3px solid rgba(255,255,255,.3);
      background:linear-gradient(135deg,#c8a87a,#a0784a);
      display:flex;align-items:center;justify-content:center;
      font-size:36px;overflow:hidden;flex-shrink:0;
    }
    .admin-popup-av img { width:100%;height:100%;object-fit:cover; }
    .admin-popup-name { font-size:18px;font-weight:700;color:#fff;text-align:center; }
    .admin-popup-body { padding:18px 20px 4px;display:flex;flex-direction:column;gap:14px; }
    .admin-popup-row  { display:flex;align-items:flex-start;gap:14px; }
    .admin-popup-ico  { font-size:20px;flex-shrink:0;margin-top:1px; }
    .admin-popup-info { flex:1;min-width:0; }
    .admin-popup-label { font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em; }
    .admin-popup-val   { font-size:14px;color:#2a1200;margin-top:3px;word-break:break-word;line-height:1.5; }
    .admin-popup-val.empty { color:var(--muted);font-style:italic; }
    .admin-popup-close {
      margin:16px 20px 24px;padding:12px;background:var(--cream);
      border:none;border-radius:14px;width:calc(100% - 40px);
      font-family:inherit;font-size:14px;font-weight:700;
      color:var(--brown);cursor:pointer;transition:background .15s;display:block;
    }
    .admin-popup-close:hover { background:#f0e4d0; }
    /* drag handle */
    .drag-handle {
      width:40px;height:4px;background:var(--border);border-radius:2px;
      margin:10px auto 0;
    }

    /* CHAT */
    .chat-area {
      flex: 1; overflow-y: auto;
      padding: 14px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .msg-row {
      display: flex; align-items: flex-end; gap: 8px;
      max-width: 82%;
    }
    .msg-row.me  { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.them{ align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--amber);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; overflow: hidden;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .msg-col { display: flex; flex-direction: column; gap: 2px; max-width: 100%; }

    .bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 14px; line-height: 1.55;
      word-break: break-word;
    }
    .me   .bubble { background: var(--brown); color: #ffeedd; border-bottom-right-radius: 4px; }
    .them .bubble { background: var(--white); color: #2a1200; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(60,20,0,.1); }

    .msg-time { font-size: 10px; color: var(--muted); }
    .me   .msg-time { text-align: right; }

    /* read receipt */
    .read-tick { font-size: 11px; margin-left: 3px; }
    .read-tick.sent     { color: var(--muted); }
    .read-tick.read     { color: #2196F3; }

    /* date separator */
    .date-sep {
      display: flex; align-items: center; gap: 8px; margin: 4px 0;
    }
    .date-sep::before, .date-sep::after {
      content:''; flex:1; height:1px; background: var(--border);
    }
    .date-sep span { font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* states */
    .state-box {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:12px; text-align:center; padding: 32px;
    }
    .state-icon { font-size: 48px; opacity: .55; }
    .state-title { font-size: 17px; font-weight: 700; color: #2a1200; }
    .state-desc  { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .btn-login {
      padding: 11px 24px; background: var(--brown); color: #fff;
      border: none; border-radius: 10px; font-family: inherit;
      font-size: 14px; font-weight: 600; cursor: pointer;
      text-decoration: none; display: inline-block; margin-top: 4px;
    }

    .loading-dots span {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--amber); margin: 0 3px;
      animation: bounce .9s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(.7);opacity:.5} 40%{transform:scale(1);opacity:1} }

    /* INPUT */
    .input-row {
      flex-shrink: 0; display: flex; align-items: flex-end; gap: 8px;
      padding: 10px 12px; background: var(--white);
      border-top: 1.5px solid var(--border);
    }
    .input-row textarea {
      flex: 1; border: 1.5px solid var(--border); border-radius: 20px;
      padding: 9px 15px; font-family: inherit; font-size: 14px;
      background: var(--cream); color: #2a1200;
      resize: none; outline: none;
      min-height: 40px; max-height: 110px; line-height: 1.5;
      transition: border .18s;
    }
    .input-row textarea:focus { border-color: var(--amber); }
    .input-row textarea::placeholder { color: #bbb; }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: none; cursor: pointer; flex-shrink: 0;
      background: var(--brown); color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
    }
    .send-btn:hover   { background: var(--amber); }
    .send-btn:active  { transform: scale(.9); }
    .send-btn:disabled{ background: #ccc; cursor: not-allowed; }

    /* toast */
    .toast {
      position: fixed; bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--brown); color: #fff;
      padding: 9px 18px; border-radius: 20px;
      font-size: 13px; opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s; z-index: 99;
    }
    .toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

    /* order card */
    .order-card {
      display:flex; gap:10px; align-items:center; background:var(--white);
      border:1.5px solid var(--border); border-radius:14px; padding:9px;
      cursor:pointer; transition:box-shadow .15s, transform .1s; max-width:240px;
    }
    .order-card:hover { box-shadow:0 4px 14px rgba(60,20,0,.18); transform:translateY(-1px); }
    .order-card-img {
      width:50px; height:50px; border-radius:10px; flex-shrink:0;
      background:var(--amber);
      display:flex; align-items:center; justify-content:center;
      font-size:22px; overflow:hidden; color:#fff;
    }
    .order-card-img img { width:100%; height:100%; object-fit:cover; }
    .order-card-body { flex:1; min-width:0; }
    .order-card-title {
      font-size:11.5px; font-weight:700; color:#2a1200; margin-bottom:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .order-card-items {
      font-size:11px; color:var(--muted); line-height:1.4;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .order-card-total { font-size:12px; font-weight:700; color:#b8762b; margin-top:3px; }
    .order-card-hint {
      font-size:9px; color:var(--muted); margin-top:4px; opacity:.8;
      display:flex; align-items:center; gap:3px;
    }

    /* popup info pemesan */
    .popup-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.48);
      z-index:200; display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .22s;
    }
    .popup-overlay.show { opacity:1; pointer-events:all; }
    .popup-card {
      background:var(--white); border-radius:20px; width:min(320px,90vw);
      overflow:hidden; transform:translateY(20px) scale(.97);
      transition:transform .22s cubic-bezier(.22,1,.36,1);
      box-shadow:0 12px 40px rgba(0,0,0,.25);
    }
    .popup-overlay.show .popup-card { transform:none; }
    .popup-banner {
      background:linear-gradient(135deg,var(--brown),#7a3e10);
      padding:26px 20px 20px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
    }
    .popup-av {
      width:74px; height:74px; border-radius:50%;
      border:3px solid rgba(255,255,255,.3);
      background:var(--amber);
      display:flex; align-items:center; justify-content:center;
      font-size:30px; overflow:hidden; flex-shrink:0;
    }
    .popup-av img { width:100%; height:100%; object-fit:cover; }
    .popup-uname { font-size:16px; font-weight:700; color:#fff; text-align:center; }
    .popup-uid   { font-size:11px; color:#d4b896; text-align:center; word-break:break-all; margin-top:-4px; }
    .popup-body  { padding:14px 20px 4px; display:flex; flex-direction:column; gap:12px; }
    .popup-row   { display:flex; align-items:flex-start; gap:12px; }
    .popup-ico   { font-size:17px; flex-shrink:0; margin-top:1px; }
    .popup-info  { flex:1; min-width:0; }
    .popup-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .popup-val   { font-size:13.5px; color:#2a1200; margin-top:2px; word-break:break-word; line-height:1.5; }
    .popup-val.empty { color:var(--muted); font-style:italic; }
    .popup-close {
      margin:14px 20px 18px; padding:10px; background:var(--cream);
      border:none; border-radius:12px; width:calc(100% - 40px);
      font-family:inherit; font-size:13.5px; font-weight:600;
      color:var(--brown); cursor:pointer; transition:background .15s; display:block;
    }
    .popup-close:hover { background:#f0e4d0; }
  </style>
</head>
<body>

<nav>
  <button class="btn-back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <button class="nav-profile-btn" onclick="openAdminPopup()" title="Lihat profil admin">
    <div class="nav-avatar" id="navAdminAv">🍱</div>
    <div class="nav-info">
      <div class="nav-title" id="navAdminName">Admin Catering</div>
      <div class="nav-meta">
        <span class="nav-jam" id="navAdminJam">Catering</span>
      </div>
    </div>
  </button>
</nav>

<!-- Popup Profil Admin -->
<div class="admin-popup-overlay" id="adminPopup" onclick="closeAdminPopupBg(event)">
  <div class="admin-popup-card">
    <div class="drag-handle"></div>
    <div class="admin-popup-banner">
      <div class="admin-popup-av" id="adminPopupAv">🍱</div>
      <div class="admin-popup-name" id="adminPopupName">Admin Catering</div>
    </div>
    <div class="admin-popup-body">
      <div class="admin-popup-row" id="adminPopupJamRow">
        <div class="admin-popup-ico">🕐</div>
        <div class="admin-popup-info">
          <div class="admin-popup-label">Jam Buka</div>
          <div class="admin-popup-val" id="adminPopupJam">—</div>
        </div>
      </div>
      <div class="admin-popup-row" id="adminPopupHpRow">
        <div class="admin-popup-ico">📞</div>
        <div class="admin-popup-info">
          <div class="admin-popup-label">No. HP / WhatsApp</div>
          <div class="admin-popup-val" id="adminPopupHp">—</div>
        </div>
      </div>
      <div class="admin-popup-row" id="adminPopupAlamatRow">
        <div class="admin-popup-ico">📍</div>
        <div class="admin-popup-info">
          <div class="admin-popup-label">Alamat</div>
          <div class="admin-popup-val" id="adminPopupAlamat">—</div>
        </div>
      </div>
    </div>
    <button class="admin-popup-close" onclick="closeAdminPopup()">Tutup</button>
  </div>
</div>

<div id="root" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
  <div class="state-box"><div class="loading-dots"><span></span><span></span><span></span></div></div>
</div>

<div class="input-row" id="inputRow" style="display:none">
  <textarea id="msgInput" placeholder="Ketik pesan…" rows="1"
    oninput="resize(this)" onkeydown="onKey(event)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="send()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<!-- Popup info pemesan (untuk kartu pesanan) -->
<div class="popup-overlay" id="userPopup" onclick="closePopup(event)">
  <div class="popup-card" id="popupCard">
    <div class="popup-banner">
      <div class="popup-av" id="popupAv">👤</div>
      <div class="popup-uname" id="popupName">—</div>
      <div class="popup-uid"  id="popupId">—</div>
    </div>
    <div class="popup-body">
      <div class="popup-row">
        <div class="popup-ico">📞</div>
        <div class="popup-info">
          <div class="popup-label">No. Telepon</div>
          <div class="popup-val" id="popupPhone">—</div>
        </div>
      </div>
      <div class="popup-row">
        <div class="popup-ico">📍</div>
        <div class="popup-info">
          <div class="popup-label">Alamat</div>
          <div class="popup-val" id="popupAddress">—</div>
        </div>
      </div>
    </div>
    <button class="popup-close" onclick="closePopupDirect()">Tutup</button>
  </div>
</div>

<script>
const SB   = 'https://rrcgjwnllrdszypdtljq.supabase.co/rest/v1';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyY2dqd25sbHJkc3p5cGR0bGpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTg5ODMsImV4cCI6MjA5NzM3NDk4M30.nDTdKo7vNQtbDagV_ueK9twBMejj9QCYFYe8Ps_lqco';
const H    = { 'apikey': KEY, 'Authorization': 'Bearer '+KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };

let session = null;
let timer   = null;

const ORDER_CARD_PREFIX = '@@ORDER_CARD@@';
const MENU_CARD_PREFIX  = '@@MENU_CARD@@';
let orderCardRegistry = [];

function parseOrderCard(content){
  if (typeof content !== 'string' || !content.startsWith(ORDER_CARD_PREFIX)) return null;
  try { return JSON.parse(content.slice(ORDER_CARD_PREFIX.length)); } catch(e) { return null; }
}

function parseMenuCard(content){
  if (typeof content !== 'string' || !content.startsWith(MENU_CARD_PREFIX)) return null;
  try { return JSON.parse(content.slice(MENU_CARD_PREFIX.length)); } catch(e) { return null; }
}

function renderMenuCardHtml(menu){
  const img = menu.image_url || null;
  const imgHtml = img
    ? `<img src="${esc(img)}" onerror="this.parentElement.innerHTML='<span style=font-size:22px>${esc(menu.emoji||'🍱')}</span>'" alt="">`
    : `<span style="font-size:22px">${esc(menu.emoji||'🍱')}</span>`;
  const priceText = menu.price ? 'Rp ' + Number(menu.price).toLocaleString('id-ID') : '';
  const menuId = menu.id ? encodeURIComponent(menu.id) : '';
  const menuName = esc(menu.name || '');
  return `<div class="order-card" onclick="openMenuDetail('${menuId}','${menuName}')" title="Lihat detail menu">
    <div class="order-card-img" style="background:${esc(menu.bg||'linear-gradient(135deg,#c8a87a,#a0784a)')}">${imgHtml}</div>
    <div class="order-card-body">
      <div class="order-card-title">🍽️ ${menuName}</div>
      ${menu.category ? `<div class="order-card-items">${esc(menu.category)}</div>` : ''}
      ${priceText ? `<div class="order-card-total">${priceText}</div>` : ''}
      <div class="order-card-hint">👆 Ketuk untuk lihat detail</div>
    </div>
  </div>`;
}

function openMenuDetail(menuId, menuName){
  // Simpan ke sessionStorage agar index.html bisa baca setelah halaman load
  try {
    sessionStorage.setItem('open_menu', JSON.stringify({
      menu_id:   decodeURIComponent(menuId),
      menu_name: menuName
    }));
  } catch(e) {}
  window.location.href = 'index.html';
}
function findCardImage(card){
  const items = card.items || [];
  for (const it of items) { if (it.image) return it.image; }
  return null;
}
function renderOrderCardHtml(card){
  const idx = orderCardRegistry.push(card) - 1;
  const img = findCardImage(card);
  const imgHtml = img ? `<img src="${esc(img)}" onerror="this.parentElement.innerHTML='<span style=\\'font-size:22px\\'>🍱</span>'" alt="">` : '🍱';
  const items = card.items || [];
  const itemNames = items.map(it => `${esc(it.name||'')} x${it.qty||1}`).join(', ');
  const totalText = 'Rp ' + (Number(card.total)||0).toLocaleString('id-ID');
  const firstItem = items[0] || {};
  const firstMenuId   = encodeURIComponent(firstItem.menu_id || '');
  const firstMenuName = esc(firstItem.name || '');
  const orderId = esc(String(card.order_id||''));
  return `<div class="order-card" onclick="openMenuDetail('${firstMenuId}','${firstMenuName}')" title="Ketuk untuk lihat menu">
    <div class="order-card-img">${imgHtml}</div>
    <div class="order-card-body">
      <div class="order-card-title">📋 Pesanan #${orderId}</div>
      <div class="order-card-items">${itemNames || '—'}</div>
      <div class="order-card-total">${totalText}</div>
      <div class="order-card-hint">🍽️ Ketuk untuk lihat menu</div>
    </div>
  </div>`;
}
function showOrderPopup(idx){
  const card = orderCardRegistry[idx];
  if (!card) return;
  const c = card.customer || {};
  document.getElementById('popupAv').innerHTML = c.avatar
    ? `<img src="${esc(c.avatar)}" onerror="this.style.display='none'" alt="">`
    : '<span style="font-size:30px">👤</span>';
  document.getElementById('popupName').textContent = c.name || '—';
  document.getElementById('popupId').textContent = 'Pesanan #' + (card.order_id || '—');
  const ph = document.getElementById('popupPhone');
  ph.textContent = c.phone || 'Tidak tersedia';
  ph.className = 'popup-val' + (c.phone ? '' : ' empty');
  const ad = document.getElementById('popupAddress');
  ad.textContent = c.address || 'Tidak tersedia';
  ad.className = 'popup-val' + (c.address ? '' : ' empty');
  document.getElementById('userPopup').classList.add('show');
}
function closePopup(e){
  if (e.target === document.getElementById('userPopup')) closePopupDirect();
}
function closePopupDirect(){
  document.getElementById('userPopup').classList.remove('show');
}

function getSession() {
  try { return JSON.parse(localStorage.getItem('nf_session')||'null'); } catch { return null; }
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2800);
}
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
function onKey(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function fmt(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  const yes = new Date(now); yes.setDate(now.getDate()-1);
  if (d.toDateString()===now.toDateString()) return 'Hari ini';
  if (d.toDateString()===yes.toDateString()) return 'Kemarin';
  return d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function api(path, opts={}) {
  const r = await fetch(SB+path, { headers:H, ...opts });
  const t = await r.text();
  return t ? JSON.parse(t) : null;
}

async function loadMessages() {
  let rows;
  try {
    rows = await api(`/pesan?or=(and(sender_id.eq.${encodeURIComponent(session.id)},receiver_id.eq.admin),and(sender_id.eq.admin,receiver_id.eq.${encodeURIComponent(session.id)}))&order=created_at.asc&limit=200`);
  } catch(e) { rows = null; }

  const root = document.getElementById('root');
  if (rows === null) {
    root.innerHTML = `<div class="state-box">
      <div class="state-icon">⚙️</div>
      <div class="state-title">Fitur belum aktif</div>
      <div class="state-desc">Minta admin untuk membuat tabel <strong>pesan</strong> di Supabase.</div>
    </div>`;
    return;
  }

  if (!rows.length) {
    root.innerHTML = `<div class="state-box">
      <div class="state-icon">💬</div>
      <div class="state-title">Belum ada pesan</div>
      <div class="state-desc">Kirim pesan pertamamu ke admin!</div>
    </div>`;
    return;
  }

  // Tandai pesan dari admin sebagai dibaca
  markAdminMsgRead();

  let html = '<div class="chat-area" id="chatArea">';
  let lastDate = '';
  orderCardRegistry = [];
  rows.forEach(m => {
    const d = fmtDate(m.created_at);
    if (d !== lastDate) {
      html += `<div class="date-sep"><span>${esc(d)}</span></div>`;
      lastDate = d;
    }
    const isMe = m.sender_id === session.id;
    const cls  = isMe ? 'me' : 'them';
    // Avatar: user pakai foto sesi, admin pakai foto dari Supabase (sudah dimuat di _adminProfil)
    const adminPhotoUrl = _adminProfil?.photo_url || '';
    const adminAvHtml = adminPhotoUrl
      ? `<img src="${adminPhotoUrl.startsWith('data:') ? adminPhotoUrl : esc(adminPhotoUrl)}" onerror="this.style.display='none';this.parentElement.innerHTML='🍱'" alt="">`
      : '🍱';
    const av = isMe
      ? (session.avatar_url ? `<img src="${esc(session.avatar_url)}" onerror="this.style.display='none'" alt="">` : (session.name||'U')[0].toUpperCase())
      : adminAvHtml;
    const card     = parseOrderCard(m.content);
    const menuCard = !card ? parseMenuCard(m.content) : null;
    const bodyHtml = card
      ? renderOrderCardHtml(card)
      : menuCard
        ? renderMenuCardHtml(menuCard)
        : `<div class="bubble">${esc(m.content)}</div>`;

    // Read tick hanya untuk pesan saya (isMe)
    let tickHtml = '';
    if (isMe) {
      const isRead = m.is_read === true || m.is_read === 'true';
      tickHtml = `<span class="read-tick ${isRead ? 'read' : 'sent'}" title="${isRead ? 'Dibaca' : 'Terkirim'}">${isRead ? '✓✓' : '✓'}</span>`;
    }

    html += `<div class="msg-row ${cls}">
      <div class="msg-avatar">${av}</div>
      <div class="msg-col">
        ${bodyHtml}
        <div class="msg-time">${fmt(m.created_at)}${tickHtml}</div>
      </div>
    </div>`;
  });
  html += '</div>';

  root.innerHTML = html;
  const area = document.getElementById('chatArea');
  if (area) area.scrollTop = area.scrollHeight;
}

async function send() {
  const inp = document.getElementById('msgInput');
  const txt = (inp.value||'').trim();
  if (!txt) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true; inp.value = ''; inp.style.height='auto';
  try {
    await api('/pesan', {
      method: 'POST',
      body: JSON.stringify({
        sender_id: session.id,
        sender_name: session.name || session.email || 'User',
        sender_avatar: session.avatar_url || null,
        receiver_id: 'admin',
        content: txt,
        created_at: new Date().toISOString(),
        is_read: false
      })
    });
    await loadMessages();
  } catch(e) {
    toast('Gagal kirim pesan ❌');
    inp.value = txt;
  } finally { btn.disabled = false; inp.focus(); }
}

function init() {
  session = getSession();
  if (!session) {
    document.getElementById('root').innerHTML = `<div class="state-box">
      <div class="state-icon">🔒</div>
      <div class="state-title">Belum login</div>
      <div class="state-desc">Silakan login terlebih dahulu untuk mengirim pesan.</div>
      <a class="btn-login" href="index.html">Kembali & Login</a>
    </div>`;
    return;
  }
  document.getElementById('inputRow').style.display = 'flex';
  markAdminMsgRead();
  // Muat profil admin dulu agar foto tersedia saat render chat
  loadAdminProfile().then(() => {
    loadMessages();
    timer = setInterval(loadMessages, 8000);
  });
}

async function markAdminMsgRead() {
  if (!session) return;
  try {
    await fetch(`${SB}/pesan?sender_id=eq.admin&receiver_id=eq.${encodeURIComponent(session.id)}&is_read=eq.false`, {
      method: 'PATCH',
      headers: { ...H, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ is_read: true })
    });
  } catch(e) {}
}

init();

let _adminProfil = null;

async function loadAdminProfile() {
  try {
    const rows = await api('/admin_profile?id=eq.1&select=*&limit=1');
    const p = rows && rows[0];
    if (!p) return;
    _adminProfil = p;

    // Avatar nav
    const avEl = document.getElementById('navAdminAv');
    if (p.photo_url) {
      const safeUrl = p.photo_url.startsWith('data:') ? p.photo_url : esc(p.photo_url);
      avEl.innerHTML = `<img src="${safeUrl}" onerror="this.parentElement.innerHTML='🍱'" alt="">`;
    }
    // Nama nav
    if (p.nama) document.getElementById('navAdminName').textContent = p.nama;
    // Sub nav
    const jamEl = document.getElementById('navAdminJam');
    jamEl.textContent = p.jam_buka ? ('Buka: ' + p.jam_buka) : (p.nama || 'Catering');
  } catch(e) { console.error('loadAdminProfile error:', e); }
}

function openAdminPopup() {
  const p = _adminProfil;
  // Isi data profil ke popup
  const avEl = document.getElementById('adminPopupAv');
  if (p?.photo_url) {
    const safeUrl = p.photo_url.startsWith('data:') ? p.photo_url : esc(p.photo_url);
    avEl.innerHTML = `<img src="${safeUrl}" onerror="this.parentElement.innerHTML='🍱'" alt="">`;
  } else { avEl.innerHTML = '🍱'; }

  document.getElementById('adminPopupName').textContent = p?.nama || 'Admin Catering';

  const setVal = (id, val) => {
    const el = document.getElementById(id);
    if (val) { el.textContent = val; el.className = 'admin-popup-val'; }
    else      { el.textContent = 'Tidak tersedia'; el.className = 'admin-popup-val empty'; }
  };
  setVal('adminPopupJam',    p?.jam_buka);
  setVal('adminPopupHp',     p?.no_hp);
  setVal('adminPopupAlamat', p?.alamat);

  document.getElementById('adminPopup').classList.add('show');
}

function closeAdminPopup() {
  document.getElementById('adminPopup').classList.remove('show');
}
function closeAdminPopupBg(e) {
  if (e.target === document.getElementById('adminPopup')) closeAdminPopup();
}
</script>
