<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesan Masuk — Admin Catering</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=optional"
        onload="this.onload=null;this.rel='stylesheet'" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown:  #3d1f0a;
      --amber:  #e8a020;
      --cream:  #fdf6ee;
      --white:  #ffffff;
      --muted:  #7a5c3a;
      --border: #e8ddd0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      height: 100dvh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    nav {
      background: var(--brown);
      display: flex; align-items: center; gap: 10px;
      padding: 0 14px; height: 56px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .btn-back {
      background: none; border: none; cursor: pointer;
      color: #d4b896; padding: 8px; border-radius: 8px;
      display: flex; align-items: center; transition: background .15s; flex-shrink: 0;
    }
    .btn-back:hover { background: rgba(255,255,255,.1); }
    .nav-title { font-size: 15px; font-weight: 700; color: #fff; flex: 1; }
    .nav-sub   { font-size: 11px; color: #d4b896; }
    .layout { flex: 1; display: flex; overflow: hidden; }
    .user-list {
      width: 260px; flex-shrink: 0;
      border-right: 1.5px solid var(--border);
      background: var(--white);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .user-list-head {
      padding: 12px 14px; font-size: 12px; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1.5px solid var(--border); background: var(--cream); flex-shrink: 0;
    }
    .user-list-body { flex:1; overflow-y:auto; }
    .user-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; cursor: pointer;
      border-bottom: 1px solid #f5f0eb;
      transition: background .13s;
    }
    .user-item:hover  { background: var(--cream); }
    .user-item.active { background: #fdf6ee; border-left: 3px solid var(--amber); }
    .user-av {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg,#c8a87a,#a0784a);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; overflow: hidden;
    }
    .user-av img { width:100%; height:100%; object-fit:cover; }
    .user-meta { flex:1; min-width:0; }
    .user-name {
      font-size: 13px; font-weight: 600; color: #2a1200;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-preview {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
    }
    .user-time { font-size: 10px; color: var(--muted); flex-shrink: 0; }
    .unread-badge {
      background: var(--amber); color: var(--brown);
      border-radius: 50%; width: 18px; height: 18px;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: 4px;
    }
    .list-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; padding: 40px 16px;
      text-align: center; color: var(--muted);
    }
    .list-empty .ico { font-size: 32px; opacity: .5; }
    .list-empty p { font-size: 13px; }
    .chat-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .chat-head {
      padding: 10px 14px; border-bottom: 1.5px solid var(--border);
      background: var(--cream); display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .chat-head-av {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink:0;
      background: linear-gradient(135deg,#c8a87a,#a0784a);
      display:flex; align-items:center; justify-content:center; font-size:16px; overflow:hidden;
    }
    .chat-head-av img { width:100%;height:100%;object-fit:cover; }
    .chat-head-name  { font-size: 14px; font-weight: 700; color: #2a1200; }
    .chat-head-email { font-size: 11px; color: var(--muted); }
    .chat-area {
      flex:1; overflow-y:auto; padding:14px 12px;
      display:flex; flex-direction:column; gap:8px;
    }
    .msg-row { display:flex; align-items:flex-end; gap:8px; max-width:82%; }
    .msg-row.me   { align-self:flex-end; flex-direction:row-reverse; }
    .msg-row.them { align-self:flex-start; }
    .msg-av {
      width:28px;height:28px;border-radius:50%;
      background:linear-gradient(135deg,#c8a87a,#a0784a);
      display:flex;align-items:center;justify-content:center;
      font-size:12px;flex-shrink:0;overflow:hidden;
    }
    .msg-av img { width:100%;height:100%;object-fit:cover; }
    .msg-col { display:flex;flex-direction:column;gap:2px;max-width:100%; }
    .sender-name { font-size:11px;font-weight:600;color:#c8880e;margin-bottom:1px; }
    .bubble {
      padding:9px 13px; border-radius:16px;
      font-size:14px; line-height:1.55; word-break:break-word;
    }
    .me   .bubble { background:var(--brown);color:#ffeedd;border-bottom-right-radius:4px; }
    .them .bubble { background:var(--white);color:#2a1200;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(60,20,0,.1); }
    .msg-time { font-size:10px;color:var(--muted); }
    .me .msg-time { text-align:right; }

    /* read receipt */
    .read-tick { font-size: 11px; margin-left: 3px; }
    .read-tick.sent { color: var(--muted); }
    .read-tick.read { color: #2196F3; }
    .date-sep { display:flex;align-items:center;gap:8px;margin:4px 0; }
    .date-sep::before,.date-sep::after { content:'';flex:1;height:1px;background:var(--border); }
    .date-sep span { font-size:11px;color:var(--muted);white-space:nowrap; }
    .state-box {
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:10px;text-align:center;padding:32px;color:var(--muted);
    }
    .state-box .ico { font-size:44px;opacity:.5; }
    .state-box p { font-size:14px;line-height:1.6; }
    .input-row {
      flex-shrink:0;display:flex;align-items:flex-end;gap:8px;
      padding:10px 12px;background:var(--white);border-top:1.5px solid var(--border);
    }
    .input-row textarea {
      flex:1;border:1.5px solid var(--border);border-radius:20px;
      padding:9px 15px;font-family:inherit;font-size:14px;
      background:var(--cream);color:#2a1200;
      resize:none;outline:none;min-height:40px;max-height:110px;line-height:1.5;
      transition:border .18s;
    }
    .input-row textarea:focus { border-color:var(--amber); }
    .input-row textarea::placeholder { color:#bbb; }
    .send-btn {
      width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;
      background:var(--brown);color:#fff;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s,transform .1s;
    }
    .send-btn:hover  { background:var(--amber); }
    .send-btn:active { transform:scale(.9); }
    .send-btn:disabled { background:#ccc;cursor:not-allowed; }
    .toast {
      position:fixed;bottom:72px;left:50%;
      transform:translateX(-50%) translateY(16px);
      background:var(--brown);color:#fff;
      padding:9px 18px;border-radius:20px;
      font-size:13px;opacity:0;pointer-events:none;
      transition:opacity .25s,transform .25s;z-index:99;
    }
    .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
    .order-card {
      display:flex;gap:10px;align-items:center;background:var(--white);
      border:1.5px solid var(--border);border-radius:14px;padding:9px;
      cursor:pointer;transition:box-shadow .15s,transform .1s;max-width:240px;
    }
    .order-card:hover { box-shadow:0 4px 14px rgba(60,20,0,.18);transform:translateY(-1px); }
    .order-card-img {
      width:50px;height:50px;border-radius:10px;flex-shrink:0;
      background:linear-gradient(135deg,#c8a87a,#a0784a);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;overflow:hidden;color:#fff;
    }
    .order-card-img img { width:100%;height:100%;object-fit:cover; }
    .order-card-body { flex:1;min-width:0; }
    .order-card-title {
      font-size:11.5px;font-weight:700;color:#2a1200;margin-bottom:2px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .order-card-items {
      font-size:11px;color:var(--muted);line-height:1.4;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .order-card-total { font-size:12px;font-weight:700;color:#b8762b;margin-top:3px; }
    .order-card-hint {
      font-size:9px;color:var(--muted);margin-top:4px;opacity:.8;
      display:flex;align-items:center;gap:3px;
    }
    .loading-dots span {
      display:inline-block;width:8px;height:8px;
      border-radius:50%;background:var(--amber);margin:0 3px;
      animation:bounce .9s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2){ animation-delay:.15s; }
    .loading-dots span:nth-child(3){ animation-delay:.30s; }
    @keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}
    @media(max-width:580px){
      .user-list {
        position:fixed;inset:56px 0 0;width:100%;z-index:50;
        transform:translateX(-100%);
        transition:transform .3s cubic-bezier(.22,1,.36,1);
      }
      .user-list.open { transform:translateX(0); }
      .btn-toggle { display:flex!important; }
    }
    .btn-toggle {
      display:none;background:none;border:none;cursor:pointer;
      color:#d4b896;padding:8px;border-radius:8px;
      align-items:center;transition:background .15s;flex-shrink:0;
    }
    .btn-toggle:hover { background:rgba(255,255,255,.1); }
    /* chat-head clickable */
    .chat-head { cursor:pointer; transition:background .15s; }
    .chat-head:hover { background:#f5ece0; }
    .chat-head-tap-hint { font-size:10px;color:var(--muted);margin-top:1px;opacity:.75; }
    /* popup overlay */
    .popup-overlay {
      position:fixed;inset:0;background:rgba(0,0,0,.48);
      z-index:200;display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .22s;
    }
    .popup-overlay.show { opacity:1;pointer-events:all; }
    .popup-card {
      background:var(--white);border-radius:20px;width:min(340px,90vw);
      overflow:hidden;
      transform:translateY(20px) scale(.97);
      transition:transform .22s cubic-bezier(.22,1,.36,1);
      box-shadow:0 12px 40px rgba(0,0,0,.25);
    }
    .popup-overlay.show .popup-card { transform:none; }
    .popup-banner {
      background:linear-gradient(135deg,var(--brown),#7a3e10);
      padding:28px 20px 22px;
      display:flex;flex-direction:column;align-items:center;gap:10px;
    }
    .popup-av {
      width:82px;height:82px;border-radius:50%;
      border:3px solid rgba(255,255,255,.3);
      background:linear-gradient(135deg,#c8a87a,#a0784a);
      display:flex;align-items:center;justify-content:center;
      font-size:34px;overflow:hidden;flex-shrink:0;
    }
    .popup-av img { width:100%;height:100%;object-fit:cover; }
    .popup-uname { font-size:17px;font-weight:700;color:#fff;text-align:center; }
    .popup-uid   { font-size:11px;color:#d4b896;text-align:center;word-break:break-all;margin-top:-4px; }
    .popup-body  { padding:16px 20px 4px;display:flex;flex-direction:column;gap:12px; }
    .popup-row   { display:flex;align-items:flex-start;gap:12px; }
    .popup-ico   { font-size:18px;flex-shrink:0;margin-top:1px; }
    .popup-info  { flex:1;min-width:0; }
    .popup-label { font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em; }
    .popup-val   { font-size:14px;color:#2a1200;margin-top:2px;word-break:break-word;line-height:1.5; }
    .popup-val.empty { color:var(--muted);font-style:italic; }
    .popup-close {
      margin:16px 20px 20px;padding:11px;background:var(--cream);
      border:none;border-radius:12px;width:calc(100% - 40px);
      font-family:inherit;font-size:14px;font-weight:600;
      color:var(--brown);cursor:pointer;transition:background .15s;display:block;
    }
    .popup-close:hover { background:#f0e4d0; }
    /* === MODAL EDIT PROFIL ADMIN === */
    .modal-overlay {
      position:fixed;inset:0;background:rgba(0,0,0,.55);
      z-index:300;display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .22s;
    }
    .modal-overlay.show { opacity:1;pointer-events:all; }
    .modal-box {
      background:var(--white);border-radius:20px;width:min(380px,94vw);
      max-height:90dvh;overflow-y:auto;
      transform:translateY(24px) scale(.97);
      transition:transform .22s cubic-bezier(.22,1,.36,1);
      box-shadow:0 14px 44px rgba(0,0,0,.28);
    }
    .modal-overlay.show .modal-box { transform:none; }
    .modal-header {
      background:linear-gradient(135deg,var(--brown),#7a3e10);
      padding:18px 20px; display:flex; align-items:center; gap:12px;
    }
    .modal-header-av {
      width:60px;height:60px;border-radius:50%;
      border:2.5px solid rgba(255,255,255,.3);
      background:linear-gradient(135deg,#c8a87a,#a0784a);
      display:flex;align-items:center;justify-content:center;
      font-size:26px;overflow:hidden;flex-shrink:0;cursor:pointer;
      position:relative;transition:opacity .15s;
    }
    .modal-header-av:hover { opacity:.85; }
    .modal-header-av img { width:100%;height:100%;object-fit:cover; }
    .modal-header-av .cam-ico {
      position:absolute;bottom:0;right:0;
      background:var(--amber);border-radius:50%;
      width:20px;height:20px;font-size:11px;
      display:flex;align-items:center;justify-content:center;
    }
    .modal-title { font-size:16px;font-weight:700;color:#fff;flex:1; }
    .modal-sub   { font-size:11px;color:#d4b896;margin-top:2px; }
    .modal-body  { padding:18px 20px; display:flex;flex-direction:column;gap:14px; }
    .modal-field label {
      display:block;font-size:11px;font-weight:700;
      color:var(--muted);text-transform:uppercase;letter-spacing:.05em;
      margin-bottom:5px;
    }
    .modal-field input, .modal-field textarea {
      width:100%;border:1.5px solid var(--border);border-radius:10px;
      padding:9px 12px;font-family:inherit;font-size:14px;
      color:#2a1200;background:var(--cream);outline:none;
      transition:border .18s;
    }
    .modal-field input:focus, .modal-field textarea:focus { border-color:var(--amber); }
    .modal-field textarea { resize:vertical;min-height:70px;line-height:1.5; }
    .modal-foot {
      padding:0 20px 20px;display:flex;gap:10px;
    }
    .btn-cancel {
      flex:1;padding:11px;background:var(--cream);border:1.5px solid var(--border);
      border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;
      color:var(--muted);cursor:pointer;transition:background .15s;
    }
    .btn-cancel:hover { background:#f0e4d0; }
    .btn-save {
      flex:2;padding:11px;background:var(--brown);border:none;
      border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;
      color:#fff;cursor:pointer;transition:background .15s,transform .1s;
    }
    .btn-save:hover  { background:var(--amber); }
    .btn-save:active { transform:scale(.97); }
    .btn-save:disabled { background:#ccc;cursor:not-allowed; }
    /* tombol edit profil di nav */
    .btn-edit-profil {
      background:rgba(255,255,255,.12);border:none;cursor:pointer;
      color:#d4b896;padding:7px 11px;border-radius:8px;
      display:flex;align-items:center;gap:5px;
      font-size:12px;font-weight:600;font-family:inherit;
      transition:background .15s;flex-shrink:0;
    }
    .btn-edit-profil:hover { background:rgba(255,255,255,.22); }
    .photo-preview-wrap {
      display:flex;align-items:center;gap:12px;
    }
    .photo-preview-circle {
      width:52px;height:52px;border-radius:50%;
      background:linear-gradient(135deg,#c8a87a,#a0784a);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;overflow:hidden;flex-shrink:0;
      border:2px solid var(--border);
    }
    .photo-preview-circle img { width:100%;height:100%;object-fit:cover; }
    .photo-url-input { flex:1; }
    /* upload foto */
    .upload-area {
      display:flex;flex-direction:column;gap:8px;
    }
    .upload-btn-row {
      display:flex;gap:8px;align-items:center;
    }
    .btn-upload-file {
      display:flex;align-items:center;gap:6px;
      padding:8px 14px;background:var(--amber);border:none;border-radius:10px;
      font-family:inherit;font-size:13px;font-weight:600;color:var(--brown);
      cursor:pointer;transition:background .15s,transform .1s;flex-shrink:0;
    }
    .btn-upload-file:hover { background:#d4901a; }
    .btn-upload-file:active { transform:scale(.96); }
    #fileInput { display:none; }
    .or-divider {
      font-size:11px;color:var(--muted);white-space:nowrap;
    }
    .upload-status {
      font-size:11px;color:var(--muted);min-height:16px;
    }
    .upload-status.uploading { color:var(--amber); }
    .upload-status.ok  { color:#4caf50; }
    .upload-status.err { color:#e53935; }
    /* ===== CROP OVERLAY ===== */
    .crop-overlay {
      position:fixed;inset:0;background:rgba(0,0,0,.82);
      z-index:400;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:16px;
      opacity:0;pointer-events:none;transition:opacity .2s;
    }
    .crop-overlay.show { opacity:1;pointer-events:all; }
    .crop-title { color:#fff;font-size:15px;font-weight:700; }
    .crop-hint  { color:#d4b896;font-size:12px;margin-top:-10px; }
    .crop-stage {
      position:relative;width:min(340px,90vw);height:min(340px,90vw);
      overflow:hidden;background:#111;border-radius:12px;cursor:grab;
      touch-action:none;user-select:none;
    }
    .crop-stage:active { cursor:grabbing; }
    .crop-img {
      position:absolute;transform-origin:0 0;
      pointer-events:none;
    }
    /* circle overlay */
    .crop-stage::after {
      content:'';position:absolute;inset:0;
      border-radius:12px;
      box-shadow:inset 0 0 0 9999px rgba(0,0,0,.42);
      /* circle cutout */
      -webkit-mask:radial-gradient(circle 46% at 50% 50%,transparent 99%,black 100%);
      mask:radial-gradient(circle 46% at 50% 50%,transparent 99%,black 100%);
      pointer-events:none;
    }
    .crop-actions { display:flex;gap:10px; }
    .crop-btn {
      padding:10px 22px;border:none;border-radius:12px;
      font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
      transition:background .15s,transform .1s;
    }
    .crop-btn:active { transform:scale(.96); }
    .crop-btn.cancel { background:rgba(255,255,255,.12);color:#fff; }
    .crop-btn.cancel:hover { background:rgba(255,255,255,.22); }
    .crop-btn.confirm { background:var(--amber);color:var(--brown); }
    .crop-btn.confirm:hover { background:#d4901a; }
    .crop-zoom-row { display:flex;align-items:center;gap:10px; }
    .crop-zoom-row label { color:#d4b896;font-size:12px; }
    .crop-zoom-row input[type=range] {
      width:160px;accent-color:var(--amber);
    }
  </style>
</head>
<body>

<nav>
  <button class="btn-back" onclick="window.location.href='admin.html'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <button class="btn-toggle" onclick="toggleList()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div style="flex:1;min-width:0">
    <div class="nav-title">📨 Pesan Masuk</div>
    <div class="nav-sub" id="navSub">Pilih percakapan</div>
  </div>
  <button class="btn-edit-profil" onclick="openEditProfil()" title="Edit profil admin">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Profil
  </button>
</nav>

<div class="layout">
  <div class="user-list" id="userList">
    <div class="user-list-head">Percakapan</div>
    <div class="user-list-body" id="userListBody">
      <div class="list-empty"><div class="ico">⏳</div><p>Memuat…</p></div>
    </div>
  </div>
  <div class="chat-panel" id="chatPanel">
    <div class="state-box">

function fmtDate(iso){

async function loadList(){
  // Ambil semua pesan yang melibatkan admin (baik sebagai pengirim maupun penerima)
  let rowsIn=[], rowsOut=[];
  try{ rowsIn  = await api('/pesan?receiver_id=eq.admin&order=created_at.desc&limit=500') || []; }catch(e){}
  try{ rowsOut = await api('/pesan?sender_id=eq.admin&order=created_at.desc&limit=500')   || []; }catch(e){}

  const body=document.getElementById('userListBody');

  // Gabungkan dan bentuk map percakapan per user (bukan admin)
  const convMap={};   // userId -> pesan terbaru
  const unreadMap={}; // userId -> jumlah belum dibaca (pesan dari user ke admin)

  rowsIn.forEach(m=>{
    // Pesan dari user ke admin
    const uid = m.sender_id;
    if(!convMap[uid] || new Date(m.created_at) > new Date(convMap[uid].created_at)){
      convMap[uid] = m;
    }
    if(m.is_read===false||m.is_read==='false'){
      unreadMap[uid]=(unreadMap[uid]||0)+1;
    }
  });

  rowsOut.forEach(m=>{
    // Pesan dari admin ke user
    const uid = m.receiver_id;
    if(!uid || uid==='admin') return;
    if(!convMap[uid] || new Date(m.created_at) > new Date(convMap[uid].created_at)){
      // Simpan dengan sender_id = uid agar item list tetap konsisten
      convMap[uid] = { ...m, sender_id: uid, sender_name: m.receiver_name||uid, sender_avatar: null };
    }
  });

  const convs = Object.values(convMap).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  if(!convs.length){
    body.innerHTML='<div class="list-empty"><div class="ico">📭</div><p>Belum ada percakapan</p></div>';
    return;
  }

  // Fetch profil untuk semua user sekaligus
  const ids=convs.map(u=>u.sender_id);
  let profileMap={};
  try{
    const profiles=await api(`/users?id=in.(${ids.map(id=>encodeURIComponent(id)).join(',')})&select=id,full_name,avatar_url,phone,address`);
    if(profiles) profiles.forEach(p=>{ profileMap[p.id]=p; });
  }catch(e){}

  body.innerHTML=convs.map(u=>{
    const p=profileMap[u.sender_id];
    const av=(p?.avatar_url||u.sender_avatar)
      ?`<img src="${esc(p?.avatar_url||u.sender_avatar)}" onerror="this.style.display='none'" alt="">`
      :'👤';
    const name=p?.full_name||u.sender_name||u.sender_id;
    // update cache
    if(p) userProfileCache[u.sender_id]=p;
    const active=u.sender_id===selId?' active':'';
    const unread=unreadMap[u.sender_id]||0;
    const badgeHtml=unread>0?`<div class="unread-badge">${unread>9?'9+':unread}</div>`:'';
    return `<div class="user-item${active}" onclick="selectUser('${esc(u.sender_id)}','${esc(name)}','${esc(p?.avatar_url||u.sender_avatar||'')}',this)">
      <div class="user-av">${av}</div>
      <div class="user-meta">
        <div class="user-name">${esc(name)}</div>
        <div class="user-preview">${esc((u.content||'').substring(0,38))}${(u.content||'').length>38?'…':''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
        <div class="user-time">${fmt(u.created_at)}</div>
        ${badgeHtml}
      </div>
    </div>`;
  }).join('');
}

  const prof=await fetchUserProfile(selId);
  const dispName=prof?.full_name||selName||selId;

    panel.innerHTML=`
      <div class="chat-head" onclick="showPopup()" title="Lihat profil pengguna">

      </div>
      <div class="chat-area" id="chatArea">
        <div style="display:flex;align-items:center;justify-content:center;padding:40px">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
      <div class="input-row">
        <textarea id="msgInput" placeholder="Balas ke ${esc(dispName)}…" rows="1"
          oninput="resize(this)" onkeydown="onKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>`;
  }
  let rows; try{ rows=await api(`/pesan?or=(and(sender_id.eq.${encodeURIComponent(selId)},receiver_id.eq.admin),and(sender_id.eq.admin,receiver_id.eq.${encodeURIComponent(selId)}))&order=created_at.asc&limit=200`); }catch(e){ rows=null; }
  const area=document.getElementById('chatArea');
  if(!area)return;
  const _willScroll = !silent || shouldAutoScroll(area);
  if(rows===null){ area.innerHTML='<div class="state-box"><div class="ico">⚙️</div><p>Tabel pesan belum ada</p></div>'; return; }
  if(!rows.length){ area.innerHTML='<div class="state-box"><div class="ico">💬</div><p>Belum ada pesan<br>dari user ini</p></div>'; return; }
  let html=''; let lastDate='';
  orderCardRegistry = [];
  rows.forEach(m=>{
    const d=fmtDate(m.created_at);
    if(d!==lastDate){ html+=`<div class="date-sep"><span>${esc(d)}</span></div>`; lastDate=d; }
    const isMe=m.sender_id==='admin';
    // Untuk pesan dari user: gunakan foto dari profil DB, fallback sender_avatar
    const userAvUrl=dispAv||(m.sender_avatar||'');
    const av=isMe?'🍱':(userAvUrl?`<img src="${esc(userAvUrl)}" onerror="this.style.display='none'" alt="">`:'👤');
    const card=parseOrderCard(m.content);
    const bodyHtml = card ? renderOrderCardHtml(card) : `<div class="bubble">${esc(m.content)}</div>`;

    // Read tick untuk pesan admin (isMe)
    let tickHtml = '';
    if (isMe) {
      const isRead = m.is_read === true || m.is_read === 'true';
      tickHtml = `<span class="read-tick ${isRead ? 'read' : 'sent'}" title="${isRead ? 'Dibaca' : 'Terkirim'}">${isRead ? '✓✓' : '✓'}</span>`;
    }

    html+=`<div class="msg-row ${isMe?'me':'them'}">
      <div class="msg-av">${av}</div>
      <div class="msg-col">
        ${!isMe?`<div class="sender-name">${esc(dispName)}</div>`:''}
        ${bodyHtml}
        <div class="msg-time">${fmt(m.created_at)}${tickHtml}</div>
      </div>

  });
  area.innerHTML=html;
  if(_willScroll) area.scrollTop=area.scrollHeight;
}

}

/* Jika dibuka dari tombol "Kirim Pesan" di detail pesanan admin.html,
   URL akan berisi ?to=<id_user>&name=<nama>&pesan=<isi_pesanan>&card=<json>.
   Maka langsung buka percakapan user tersebut, kirim card + note ke Supabase,
   lalu render ulang chat agar langsung tampil. */
async function initFromQuery(){
  const params = new URLSearchParams(window.location.search);
  const to = params.get('to');
  if (!to) return;

  // Bersihkan query string DULU agar tidak terulang saat reload
  history.replaceState({}, '', window.location.pathname);

  const name      = params.get('name') || to;
  const pesanText = params.get('pesan') || '';
  const cardRaw   = params.get('card')  || '';

  // Buka percakapan (render panel + pasang polling)
  await selectUser(to, name, null, null);

  // Tunggu hingga panel + input benar-benar ada di DOM
  await waitForElement('msgInput', 3000);

  // Kirim order card ke Supabase lalu render ulang
  if (cardRaw) {
    try {
      JSON.parse(cardRaw); // validasi JSON sebelum kirim
      await api('/pesan', { method:'POST', body: JSON.stringify({
        sender_id:    'admin',
        sender_name:  'Admin',
        sender_avatar: null,
        receiver_id:  to,
        receiver_name: name,
        content:      ORDER_CARD_PREFIX + cardRaw,
        created_at:   new Date().toISOString(),
        is_read:      false
      })});
    } catch(e) { toast('Gagal mengirim kartu pesanan ❌'); }
  }

  // Kirim teks sapaan sebagai pesan biasa (auto-send, bukan hanya mengisi input)
  if (pesanText) {
    try {
      await api('/pesan', { method:'POST', body: JSON.stringify({
        sender_id:    'admin',
        sender_name:  'Admin',
        sender_avatar: null,
        receiver_id:  to,
        receiver_name: name,
        content:      pesanText,
        created_at:   new Date().toISOString(),
        is_read:      false
      })});
    } catch(e) { toast('Gagal mengirim pesan sapaan ❌'); }
  }

  // Render ulang chat agar card + note langsung muncul di percakapan
  if (cardRaw || pesanText) {
    await renderChat(true);
    await loadList();
  }
}

/* Tunggu elemen dengan id tertentu muncul di DOM (maksimal maxMs milidetik) */
function waitForElement(id, maxMs=3000){
  return new Promise(resolve=>{
    if(document.getElementById(id)){ resolve(); return; }
    const t0=Date.now();
    const tick=()=>{
      if(document.getElementById(id)||Date.now()-t0>maxMs){ resolve(); return; }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}

  const t = await r.text(); return t ? JSON.parse(t) : null;

function previewPhoto(url) {
  const circ = document.getElementById('photoPreviewCircle');
  const avPrev = document.getElementById('modalAvPreview');
  if (url && (url.startsWith('http') || url.startsWith('data:'))) {
    circ.innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='🍱'" alt="">`;
    avPrev.innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='🍱'" alt=""><div class="cam-ico">📷</div>`;
  } else {
    circ.innerHTML = '🍱';
    avPrev.innerHTML = '🍱<div class="cam-ico">📷</div>';
  }
}

/* Upload foto ke Supabase Storage bucket "admin-photos" */
const SB_STORAGE = 'https://rrcgjwnllrdszypdtljq.supabase.co/storage/v1';

function setUploadStatus(type, msg) {
  const el = document.getElementById('uploadStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'upload-status ' + type;
}

/* ======================================================
   CROP + WEBP PIPELINE
   ====================================================== */
let _cropOrigFile  = null;   // File asli dari input
let _cropImgEl     = null;   // <img> di dalam stage
let _cropStageSize = 0;      // ukuran sisi stage (px)
let _cropScale     = 1;      // zoom (1 = fit, >1 = lebih besar)
let _cropMinScale  = 1;
let _cropOffX      = 0;      // offset posisi gambar dalam stage
let _cropOffY      = 0;
let _cropDragging  = false;
let _cropLastX     = 0;
let _cropLastY     = 0;
let _cropNatW      = 0;
let _cropNatH      = 0;

async function handleFileUpload(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  if (!file.type.startsWith('image/')) { setUploadStatus('err','File harus berupa gambar'); return; }
  if (file.size > 20 * 1024 * 1024)    { setUploadStatus('err','Ukuran maksimal 20 MB');   return; }

  _cropOrigFile = file;
  const dataUrl = await fileToDataUrl(file);
  openCrop(dataUrl);
}

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

/* ---------- OPEN CROP ---------- */
function openCrop(dataUrl) {
  const stage = document.getElementById('cropStage');
  const img   = document.getElementById('cropImg');
  _cropStageSize = stage.offsetWidth || 320;

  img.onload = () => {
    _cropNatW = img.naturalWidth;
    _cropNatH = img.naturalHeight;

    // scale minimum: gambar mengisi penuh sisi terpendek stage
    const shorter = Math.min(_cropNatW, _cropNatH);
    _cropMinScale = _cropStageSize / shorter;
    _cropScale    = _cropMinScale;

    // posisi awal: tengah
    _cropOffX = (_cropStageSize - _cropNatW * _cropScale) / 2;
    _cropOffY = (_cropStageSize - _cropNatH * _cropScale) / 2;

    document.getElementById('cropZoom').value = 100;
    applyCropTransform();
  };
  img.src = dataUrl;
  _cropImgEl = img;

  document.getElementById('cropOverlay').classList.add('show');
  setupCropEvents();
}

function cancelCrop() {
  document.getElementById('cropOverlay').classList.remove('show');
  _cropOrigFile = null;
}

/* ---------- DRAG ---------- */
function setupCropEvents() {
  const stage = document.getElementById('cropStage');
  // bersihkan listener lama
  stage.onmousedown  = startDrag;
  stage.ontouchstart = startDragTouch;
  window.onmousemove = moveDrag;
  window.ontouchmove = moveDragTouch;
  window.onmouseup   = endDrag;
  window.ontouchend  = endDrag;
  stage.onwheel      = onWheel;
}

function startDrag(e)      { _cropDragging=true; _cropLastX=e.clientX; _cropLastY=e.clientY; }
function startDragTouch(e) { if(!e.touches[0])return; _cropDragging=true; _cropLastX=e.touches[0].clientX; _cropLastY=e.touches[0].clientY; }
function endDrag()         { _cropDragging=false; }

function moveDrag(e) {
  if (!_cropDragging) return;
  const dx = e.clientX - _cropLastX, dy = e.clientY - _cropLastY;
  _cropLastX = e.clientX; _cropLastY = e.clientY;
  nudge(dx, dy);
}
function moveDragTouch(e) {
  if (!_cropDragging || !e.touches[0]) return;
  e.preventDefault();
  const dx = e.touches[0].clientX - _cropLastX, dy = e.touches[0].clientY - _cropLastY;
  _cropLastX = e.touches[0].clientX; _cropLastY = e.touches[0].clientY;
  nudge(dx, dy);
}

function nudge(dx, dy) {
  _cropOffX += dx; _cropOffY += dy;
  clampOffset();
  applyCropTransform();
}

function onWheel(e) {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.05 : 0.05;
  setZoomRelative(delta);
}

function onZoomSlider(val) {
  // slider 100-300 → scale dari minScale hingga minScale*3
  const t = (val - 100) / 200;   // 0..1
  _cropScale = _cropMinScale * (1 + t * 2);
  clampOffset();
  applyCropTransform();
}

function setZoomRelative(delta) {
  const oldScale = _cropScale;
  _cropScale = Math.max(_cropMinScale, Math.min(_cropMinScale * 3, _cropScale + delta * _cropMinScale));
  // Adjust offset agar zoom dari tengah stage
  const cx = _cropStageSize / 2;
  const cy = _cropStageSize / 2;
  _cropOffX = cx - (cx - _cropOffX) * (_cropScale / oldScale);
  _cropOffY = cy - (cy - _cropOffY) * (_cropScale / oldScale);
  // Sync slider
  const t = (_cropScale - _cropMinScale) / (_cropMinScale * 2);
  document.getElementById('cropZoom').value = Math.round(100 + t * 200);
  clampOffset();
  applyCropTransform();
}

function clampOffset() {
  const w = _cropNatW * _cropScale;
  const h = _cropNatH * _cropScale;
  // gambar tidak boleh meninggalkan tepi stage
  _cropOffX = Math.min(0, Math.max(_cropStageSize - w, _cropOffX));
  _cropOffY = Math.min(0, Math.max(_cropStageSize - h, _cropOffY));
}

function applyCropTransform() {
  if (!_cropImgEl) return;
  _cropImgEl.style.width     = (_cropNatW * _cropScale) + 'px';
  _cropImgEl.style.height    = (_cropNatH * _cropScale) + 'px';
  _cropImgEl.style.left      = _cropOffX + 'px';
  _cropImgEl.style.top       = _cropOffY + 'px';
}

/* ---------- CONFIRM CROP → WebP ---------- */
async function confirmCrop() {
  setUploadStatus('uploading', '⏳ Memproses foto…');
  document.getElementById('cropOverlay').classList.remove('show');

  try {
    const webpDataUrl = await cropToWebP(512, 0.82);
    previewPhoto(webpDataUrl);
    document.getElementById('photoUrlInput').value = webpDataUrl;
    setUploadStatus('uploading', '⏫ Mengupload ke Supabase…');

    // Konversi data URL → Blob untuk upload
    const blob = dataUrlToBlob(webpDataUrl);
    const path  = `admin/profil_${Date.now()}.webp`;
    const upRes = await fetch(`${SB_STORAGE}/object/admin-photos/${path}`, {
      method : 'POST',
      headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY,
                 'Content-Type': 'image/webp', 'x-upsert': 'true' },
      body   : blob
    });

    if (upRes.ok) {
      const publicUrl = `${SB_STORAGE}/object/public/admin-photos/${path}`;
      document.getElementById('photoUrlInput').value = publicUrl;
      previewPhoto(publicUrl);
      setUploadStatus('ok', '✅ Upload berhasil! (WebP)');
    } else {
      const errText = await upRes.text();
      console.warn('Storage upload gagal:', upRes.status, errText);
      // Fallback: simpan data URL, upload ke storage gagal tapi tetap bisa simpan
      setUploadStatus('ok', '✅ Foto siap (simpan untuk menyimpan)');
    }
  } catch(e) {
    console.error('confirmCrop error:', e);
    setUploadStatus('err', 'Gagal memproses foto');
  }
}

/* Crop posisi sekarang → canvas 1:1 → WebP data URL */
function cropToWebP(outputSize, quality) {
  return new Promise((resolve, reject) => {
    const img    = _cropImgEl;
    const canvas = document.createElement('canvas');
    canvas.width  = outputSize;
    canvas.height = outputSize;
    const ctx = canvas.getContext('2d');

    // Hitung area sumber (dalam koordinat gambar asli)
    // _cropOffX/_cropOffY adalah posisi pojok kiri-atas gambar relatif stage
    // Kita ingin area stage 0,0 → stageSize,stageSize
    const srcX = (-_cropOffX) / _cropScale;
    const srcY = (-_cropOffY) / _cropScale;
    const srcW =  _cropStageSize / _cropScale;
    const srcH =  _cropStageSize / _cropScale;

    // Gambar background putih agar tidak transparan
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, outputSize, outputSize);

    ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, outputSize, outputSize);

    const webpUrl = canvas.toDataURL('image/webp', quality);
    // Fallback jika browser tidak support WebP output (sangat jarang)
    resolve(webpUrl.startsWith('data:image/webp') ? webpUrl : canvas.toDataURL('image/jpeg', quality));
  });
}

function dataUrlToBlob(dataUrl) {
  const [header, b64] = dataUrl.split(',');
  const mime = header.match(/:(.*?);/)[1];
  const binary = atob(b64);
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

/* Compress gambar base64 (dipakai saat saveProfil untuk data URL fallback) */
function compressImageDataUrl(dataUrl, maxSize = 512, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const size = maxSize;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      // crop center square
      const s = Math.min(img.width, img.height);
      const sx = (img.width - s)  / 2;
      const sy = (img.height - s) / 2;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, size, size);
      ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
      const out = canvas.toDataURL('image/webp', quality);
      resolve(out.startsWith('data:image/webp') ? out : canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

async function saveProfil() {
  const btn = document.getElementById('btnSaveProfil');
  btn.disabled = true; btn.textContent = 'Menyimpan…';

  let photoVal = document.getElementById('photoUrlInput').value.trim() || null;

  // Jika foto adalah data URL (base64 dari upload), compress dulu agar tidak terlalu besar
  if (photoVal && photoVal.startsWith('data:image')) {
    try {
      photoVal = await compressImageDataUrl(photoVal, 400, 0.75);
    } catch(e) { /* pakai apa adanya */ }
  }

  const payload = {
    id       : 1,
    photo_url: photoVal,
    nama     : document.getElementById('adminNamaInput').value.trim()   || null,
    no_hp    : document.getElementById('adminHpInput').value.trim()     || null,
    jam_buka : document.getElementById('adminJamInput').value.trim()    || null,
    alamat   : document.getElementById('adminAlamatInput').value.trim() || null,
  };

  try {
    // UPSERT — aman untuk insert pertama maupun update berikutnya
    const res = await fetch(SB + '/admin_profile', {
      method : 'POST',
      headers: { ...H, 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body   : JSON.stringify(payload)
    });

    if (!res.ok) {
      const errText = await res.text();
      console.error('Supabase error:', res.status, errText);
      toast('Gagal simpan: ' + res.status + ' — ' + errText.slice(0,80));
      return;
    }

    // Update tampilan nav langsung tanpa reload
    if (payload.photo_url) {
      const avEl = document.getElementById('modalAvPreview');
      // (nav di pesan.html tidak ada, tapi foto preview modal sudah terupdate)
    }

    toast('Profil berhasil disimpan ✅');
    closeEditProfil();
  } catch(e) {
    console.error('saveProfil error:', e);
    toast('Gagal menyimpan profil ❌ ' + e.message);
  } finally {
    btn.disabled = false; btn.innerHTML = '💾 Simpan';
  }
}
